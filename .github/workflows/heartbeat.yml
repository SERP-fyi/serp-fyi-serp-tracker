name: Heartbeat

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update heartbeat
        run: |
          echo "heartbeat update $(date)" >> status.txt
          git config user.email "bot@serp.fyi"
          git config user.name "serp-fyi-bot"
          git add status.txt
          git commit -m "chore: heartbeat update $(date +'%Y-%m-%d')" || exit 0
          git push
